name: Check

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4

      # https://github.com/sksat/setup-rye
      - uses: sksat/setup-rye@v0.7.0

      - name: Install mypy and ruff
        run: |
          rye install mypy ruff
          rye sync

      - name: Run mypy
        run: mypy .

      - name: Run ruff
        run: ruff .
