name: Check

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4

      # https://github.com/sksat/setup-rye
      - name: Setup rye
        uses: sksat/setup-rye@v0.9.1

      - name: Setup dependencies
        run: rye sync --no-lock

      - name: Run pyright
        run: rye run pyright .

      - name: Run ruff
        run: rye run ruff check .
