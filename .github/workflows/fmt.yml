name: Fmt

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: read

jobs:
  fmt:
    name: Fmt
    runs-on: ubuntu-latest

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4

      # https://github.com/eifinger/setup-rye
      - name: Setup rye
        uses: eifinger/setup-rye@v1
        with:
          enable-cache: true

      - name: Setup dependencies
        run: rye sync --no-lock

      - name: Run ruff format
        run: rye run ruff format --check .

      - name: Setup prettier
        run: npm install -g prettier

      - name: Run prettier
        run: prettier --check .
